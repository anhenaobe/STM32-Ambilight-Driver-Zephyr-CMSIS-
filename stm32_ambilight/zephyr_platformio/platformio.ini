; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nucleo_l432kc

[env:nucleo_l432kc]
platform = ststm32
; PlatformIO uses this Zephyr-supported board as the closest compatible target.
board = nucleo_l432kc
framework = zephyr
monitor_speed = 921600
build_src_filter =
    -<*>
    +<main.c>
    +<app/adalight.c>
    +<app/translator.c>
    +<bsp/dma.c>
    +<bsp/pwm.c>
    +<bsp/uart.c>

[env:peripheral_diagnostics]
extends = env:nucleo_l432kc
monitor_speed = 921600
build_src_filter =
    -<*>
    +<app/adalight.c>
    +<app/translator.c>
    +<bsp/dma.c>
    +<bsp/pwm.c>
    +<bsp/uart.c>
    +<../test/peripheral_diagnostics/main.c>

[env:uart_echo]
extends = env:nucleo_l432kc
monitor_speed = 921600
build_src_filter =
    -<*>
    +<../test/uart_echo/main.c>

[env:pb3_gpio]
extends = env:nucleo_l432kc
monitor_speed = 921600
build_src_filter =
    -<*>
    +<../test/pb3_gpio/main.c>

[env:pb3_pwm_registers]
extends = env:nucleo_l432kc
monitor_speed = 921600
build_src_filter =
    -<*>
    +<../test/pb3_pwm_registers/main.c>

[env:pb3_pwm_zephyr]
extends = env:nucleo_l432kc
monitor_speed = 921600
build_src_filter =
    -<*>
    +<../test/pb3_pwm_zephyr/main.c>

[env:pb3_pwm_dma]
extends = env:nucleo_l432kc
monitor_speed = 921600
build_src_filter =
    -<*>
    +<bsp/dma.c>
    +<bsp/pwm.c>
    +<../test/pb3_pwm_dma/main.c>
